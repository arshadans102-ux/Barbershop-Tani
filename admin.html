<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Floor Status — Taha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0c0b;
    color: #f5ede0;
    font-family: -apple-system, 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ─── PIN ─── */
  #pinScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 1.5rem;
    padding: 2rem 1.5rem;
  }
  #pinScreen h2 {
    font-size: 1rem;
    letter-spacing: 3px;
    color: #c9a84c;
    text-transform: uppercase;
  }
  #pinDisplay {
    font-size: 2.2rem;
    letter-spacing: 0.6rem;
    color: #f5ede0;
    min-height: 2.8rem;
    text-align: center;
  }
  .pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    width: 100%;
    max-width: 280px;
  }
  .pin-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    color: #f5ede0;
    font-size: 1.5rem;
    padding: 1.1rem;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .pin-btn:active { background: rgba(201,168,76,0.2); }
  .pin-error { color: #ff453a; font-size: 0.82rem; min-height: 1.2rem; text-align: center; }

  /* ─── ADMIN ─── */
  #adminScreen { display: none; }

  .admin-top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #0e0c0b;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    padding: 1rem 1.25rem 0.85rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-top h1 {
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a84c;
  }
  .admin-top .live-indicator {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.65rem;
    color: rgba(245,237,224,0.35);
    letter-spacing: 1px;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #34c759;
    box-shadow: 0 0 5px #34c759;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .chairs-list {
    padding: 1rem 1.25rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .chair-row {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 0.85rem 1rem;
    transition: border-color 0.3s ease;
  }
  .chair-row.free     { border-color: rgba(52,199,89,0.25); }
  .chair-row.busy     { border-color: rgba(255,69,58,0.25); }
  .chair-row.reserved { border-color: rgba(201,168,76,0.25); }

  .chair-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }
  .chair-row-name {
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,237,224,0.6);
  }
  .chair-row-status {
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chair-row.free     .chair-row-status { color: #34c759; }
  .chair-row.busy     .chair-row-status { color: #ff453a; }
  .chair-row.reserved .chair-row-status { color: #c9a84c; }
  .chair-row-status::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .chair-row.free .chair-row-status::before { box-shadow: 0 0 5px #34c759; }

  .chair-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.45rem;
  }
  .cbtn {
    padding: 0.55rem 0.25rem;
    border-radius: 10px;
    border: 1px solid transparent;
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    background: rgba(255,255,255,0.04);
    color: rgba(245,237,224,0.4);
    border-color: rgba(255,255,255,0.07);
  }
  .cbtn:active { transform: scale(0.95); }
  .cbtn.active-free     { background: rgba(52,199,89,0.15);  border-color: rgba(52,199,89,0.4);  color: #34c759; }
  .cbtn.active-busy     { background: rgba(255,69,58,0.15);  border-color: rgba(255,69,58,0.4);  color: #ff453a; }
  .cbtn.active-reserved { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); color: #c9a84c; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(30,26,24,0.95);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 999px;
    padding: 0.55rem 1.25rem;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: rgba(245,237,224,0.7);
    transition: transform 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <h2>✂ Floor Status</h2>
  <div id="pinDisplay">····</div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()" style="color:rgba(245,237,224,0.35)">⌫</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinSubmit()" style="background:rgba(201,168,76,0.15);border-color:rgba(201,168,76,0.3);color:#c9a84c">→</button>
  </div>
  <div class="pin-error" id="pinError"></div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="admin-top">
    <h1>✂ Floor Plan</h1>
    <div class="live-indicator"><span class="live-dot"></span>LIVE</div>
  </div>
  <div class="chairs-list" id="chairsList">
    <!-- generated by JS -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  // ─── PIN ───
  const PIN = '1234';
  let entered = '';

  function pinPress(d) {
    if (entered.length >= 4) return;
    entered += d;
    document.getElementById('pinDisplay').textContent = '•'.repeat(entered.length).padEnd(4,'·');
    if (entered.length === 4) setTimeout(pinSubmit, 200);
  }
  function pinClear() {
    entered = entered.slice(0,-1);
    document.getElementById('pinDisplay').textContent = '•'.repeat(entered.length).padEnd(4,'·');
    document.getElementById('pinError').textContent = '';
  }
  function pinSubmit() {
    if (entered === PIN) {
      document.getElementById('pinScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      initAdmin();
    } else {
      document.getElementById('pinError').textContent = 'Wrong PIN';
      entered = '';
      document.getElementById('pinDisplay').textContent = '····';
    }
  }

  // ─── FIREBASE ───
  let db;
  const chairStates = {};

  function initAdmin() {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyAigVzXYSnxgLkS_qNajT7CU4RMOp1Ifto",
        authDomain: "barbershop-tani.firebaseapp.com",
        databaseURL: "https://barbershop-tani-default-rtdb.firebaseio.com",
        projectId: "barbershop-tani",
        storageBucket: "barbershop-tani.firebasestorage.app",
        messagingSenderId: "28107586921",
        appId: "1:28107586921:web:b2c40dc3466efd3c2fd1f8"
      });
    }
    db = firebase.database();

    // Build chair rows
    const list = document.getElementById('chairsList');
    for (let i = 1; i <= 6; i++) {
      list.innerHTML += `
        <div class="chair-row free" id="crow-${i}">
          <div class="chair-row-top">
            <span class="chair-row-name">Chair ${i}</span>
            <span class="chair-row-status" id="cstatus-${i}">Free</span>
          </div>
          <div class="chair-btns">
            <button class="cbtn active-free" id="cbtn-${i}-free"     onclick="setChair(${i},'free')">Free</button>
            <button class="cbtn"             id="cbtn-${i}-busy"     onclick="setChair(${i},'busy')">Busy</button>
            <button class="cbtn"             id="cbtn-${i}-reserved" onclick="setChair(${i},'reserved')">Reserved</button>
          </div>
        </div>`;
    }

    // Listen for changes
    db.ref('chairs').on('value', snap => {
      const data = snap.val() || {};
      for (let i = 1; i <= 6; i++) {
        const s = data[i] || 'free';
        chairStates[i] = s;
        updateRow(i, s);
      }
    });
  }

  function updateRow(i, s) {
    const row = document.getElementById('crow-' + i);
    const lbl = document.getElementById('cstatus-' + i);
    if (!row) return;
    row.className = 'chair-row ' + s;
    const labels = { free:'Free', busy:'Busy', reserved:'Reserved' };
    lbl.textContent = labels[s] || s;
    ['free','busy','reserved'].forEach(st => {
      const btn = document.getElementById(`cbtn-${i}-${st}`);
      btn.className = 'cbtn' + (st === s ? ' active-' + st : '');
    });
  }

  function setChair(i, status) {
    if (!db) return;
    db.ref('chairs/' + i).set(status).then(() => showToast('Chair ' + i + ' → ' + status));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
